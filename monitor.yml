name: مراقب نتائج صلاح الدين

on:
  schedule:
    - cron: '*/5 * * * *'    # كل 5 دقائق تلقائياً
  workflow_dispatch:           # تشغيل يدوي من GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت pdftotext
        run: sudo apt-get install -y poppler-utils -q

      - name: فحص النتائج
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/check.js
